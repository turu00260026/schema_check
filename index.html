<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>さんすう スキーマ しんだん</title>
  </head>
  <body>
    <div id="loading-msg" style="padding:20px;font-size:14px;background:#f0f4ff;">ページ読み込み中...</div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      var _errors = [];
      window.addEventListener('error', function(e) {
        if (e.target && e.target !== window) {
          _errors.push('404?: ' + (e.target.src || e.target.href || '?'));
        } else {
          _errors.push('JS error: ' + e.message);
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        _errors.push('Promise rejection: ' + e.reason);
      });
      setTimeout(function() {
        var loadingEl = document.getElementById('loading-msg');
        if (loadingEl) loadingEl.remove();
        var scripts = document.querySelectorAll('script[type="module"]');
        var srcs = Array.from(scripts).map(function(s){ return s.src; }).join('<br>');
        if (!document.getElementById('root').hasChildNodes()) {
          document.body.innerHTML = '<div style="padding:20px;font-size:14px;background:#f0f4ff;">'
            + '<b>Reactが起動していません</b><br><br>'
            + '<b>Module scripts:</b><br>' + (srcs || 'なし') + '<br><br>'
            + '<b>Errors:</b><br>' + (_errors.join('<br>') || 'なし') + '</div>';
        }
      }, 4000);
    </script>
  </body>
</html>
